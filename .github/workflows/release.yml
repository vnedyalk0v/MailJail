name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CGO_ENABLED: "0"

jobs:
  build:
    name: Build Release (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        goarch:
          - amd64
          - arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
          check-latest: true
          cache-dependency-path: go.sum

      - name: Build release archive
        env:
          GOOS: freebsd
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          version="${GITHUB_REF_NAME}"
          artifact="mailjail_${version}_freebsd_${GOARCH}"
          GOOS="${GOOS}" GOARCH="${GOARCH}" go build -trimpath -ldflags="-s -w -X main.version=${version}" -o "${artifact}" ./cmd/mailjail
          tar -czf "dist/${artifact}.tar.gz" "${artifact}" README.md

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-freebsd-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-freebsd-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > "${GITHUB_REF_NAME}_checksums.txt"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*_checksums.txt
